<main class="content center">
  <h2>Use your federated identity to sign in</h2>
  <section class="center">
    <div id="hidden" class="hidden center">
      <mdui-button id="fedcm" icon="lock--outlined" variant="filled">
        Sign-in with FedCM Demo IdP
      </mdui-button>
    </div>
    <p id="unsupported" class="instructions">
      This browser does not support FedCM.
    </p>
    <mdui-button href="/passkey-form-autofill" variant="text">
      Sign in with a form instead
    </mdui-button>
  </section>
</main>
